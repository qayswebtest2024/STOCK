<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StockPro Ultra | Firebase</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #fcfcfd; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        
        /* Side Menu Animation */
        #sideMenu { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .menu-open #sideMenu { transform: translateX(0); }
        .menu-closed #sideMenu { transform: translateX(100%); }
        
        /* Smooth Transitions */
        .page-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* QR Button Glow */
        .qr-glow { box-shadow: 0 10px 25px -5px rgba(249, 115, 22, 0.4); }
        
        /* Hide Scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="menu-closed">

    <div id="authView" class="fixed inset-0 z-[150] bg-orange-600 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 shadow-2xl">
            <h2 class="text-3xl font-black text-center mb-8 text-slate-800">تسجيل دخول</h2>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" class="w-full p-4 rounded-2xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-orange-500">
                <input type="password" id="loginPass" placeholder="كلمة المرور" class="w-full p-4 rounded-2xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-orange-500">
                <button onclick="handleLogin()" class="w-full bg-orange-600 text-white p-5 rounded-2xl font-bold shadow-lg shadow-orange-100">دخول</button>
            </div>
        </div>
    </div>

    <div id="appView" class="hidden min-h-screen">
        
        <header class="sticky top-0 z-40 glass border-b px-6 py-4 flex justify-between items-center">
            <button onclick="toggleMenu()" class="p-2 bg-slate-100 rounded-xl text-slate-600">
                <i data-lucide="menu"></i>
            </button>
            <h1 class="text-xl font-black text-slate-800">مخزن <span class="text-orange-600">البيتزا</span></h1>
            <div class="w-10 h-10 bg-orange-100 rounded-xl flex items-center justify-center text-orange-600 font-bold">
                <i data-lucide="user" class="w-5 h-5"></i>
            </div>
        </header>

        <div class="p-6">
            <div class="relative group">
                <i data-lucide="search" class="absolute right-4 top-4 text-slate-400 group-focus-within:text-orange-500 transition-colors"></i>
                <input type="text" id="mainSearch" oninput="filterInventory()" placeholder="ابحث عن صنف أو رمز..." 
                       class="w-full p-4 pr-12 rounded-[1.5rem] border-none bg-white shadow-sm focus:ring-2 focus:ring-orange-500 outline-none transition-all">
            </div>
        </div>

        <main id="inventoryContainer" class="p-6 pt-0 space-y-4 pb-32 page-fade">
            </main>

        <div id="sideMenuBackdrop" onclick="toggleMenu()" class="fixed inset-0 bg-slate-900/40 z-[50] hidden backdrop-blur-sm"></div>
        <aside id="sideMenu" class="fixed top-0 right-0 bottom-0 w-[80%] max-w-sm bg-white z-[60] shadow-2xl p-8 flex flex-col translate-x-full">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-black">القائمة</h2>
                <button onclick="toggleMenu()" class="text-slate-400"><i data-lucide="x"></i></button>
            </div>
            
            <nav class="space-y-2 flex-1">
                <button onclick="switchView('inventory')" class="w-full flex items-center gap-4 p-4 rounded-2xl bg-orange-50 text-orange-600 font-bold">
                    <i data-lucide="package"></i> المخزن الحالي
                </button>
                <button onclick="switchView('addItem')" class="w-full flex items-center gap-4 p-4 rounded-2xl text-slate-600 hover:bg-slate-50 font-bold">
                    <i data-lucide="plus-circle"></i> إضافة صنف جديد
                </button>
                <button onclick="switchView('logs')" class="w-full flex items-center gap-4 p-4 rounded-2xl text-slate-600 hover:bg-slate-50 font-bold">
                    <i data-lucide="history"></i> سجل العمليات
                </button>
            </nav>

            <button onclick="handleLogout()" class="w-full flex items-center gap-4 p-4 rounded-2xl text-red-500 hover:bg-red-50 font-bold mt-auto">
                <i data-lucide="log-out"></i> تسجيل الخروج
            </button>
        </aside>

        <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-40">
            <button onclick="startScanner()" class="w-16 h-16 bg-slate-900 rounded-full flex items-center justify-center text-white qr-glow active:scale-90 transition-all border-[6px] border-white">
                <i data-lucide="qr-code" class="w-7 h-7"></i>
            </button>
        </div>
    </div>

    <div id="addItemModal" class="fixed inset-0 z-[100] bg-slate-900/60 hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 space-y-4">
            <h3 class="text-xl font-bold mb-4">إضافة منتج جديد</h3>
            <input type="text" id="addName" placeholder="اسم المنتج" class="w-full p-4 bg-slate-50 rounded-xl border-none outline-none">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="addID" placeholder="ID (QR)" class="p-4 bg-slate-50 rounded-xl border-none">
                <input type="number" id="addMin" placeholder="الحد الأدنى" class="p-4 bg-slate-50 rounded-xl border-none">
            </div>
            <button onclick="addNewItem()" class="w-full bg-slate-900 text-white p-4 rounded-xl font-bold">حفظ الصنف</button>
            <button onclick="closeModal('addItemModal')" class="w-full text-slate-400 font-bold">إلغاء</button>
        </div>
    </div>

    <div id="editModal" class="fixed inset-0 z-[100] bg-slate-900/60 hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-bold">تعديل: <span id="editTitle" class="text-orange-600"></span></h3>
                <button onclick="closeModal('editModal')"><i data-lucide="x"></i></button>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div class="col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 mr-2">الكمية الحالية</label>
                    <input type="number" id="editStock" class="w-full p-4 bg-slate-50 rounded-xl border-none text-2xl font-black text-center">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 mr-2">الحد الأدنى</label>
                    <input type="number" id="editMinVal" class="w-full p-4 bg-slate-50 rounded-xl border-none">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 mr-2">ID الرمز</label>
                    <input type="text" id="editIDVal" class="w-full p-4 bg-slate-50 rounded-xl border-none" readonly>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="saveChanges()" class="flex-1 bg-orange-600 text-white p-4 rounded-xl font-bold shadow-lg shadow-orange-100">تحديث</button>
                <button onclick="deleteItem()" class="p-4 bg-red-50 text-red-500 rounded-xl"><i data-lucide="trash"></i></button>
            </div>
        </div>
    </div>

    <div id="logsModal" class="fixed inset-0 z-[100] bg-white hidden overflow-y-auto">
        <div class="sticky top-0 bg-white p-6 border-b flex justify-between items-center">
            <h3 class="text-xl font-black">سجل التتبع</h3>
            <button onclick="closeModal('logsModal')" class="bg-slate-100 p-2 rounded-xl"><i data-lucide="arrow-right"></i></button>
        </div>
        <div id="logsList" class="p-6 space-y-3"></div>
    </div>

    <div id="scannerModal" class="fixed inset-0 z-[200] bg-black hidden flex flex-col">
        <div id="reader" class="flex-1"></div>
        <button onclick="stopScanner()" class="m-10 bg-white text-black p-5 rounded-2xl font-bold">إغلاق الكاميرا</button>
    </div>

    <script type="module">
        // استيراد Firebase كما في المرات السابقة
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAi6Wd2HzSdgAB63MWt4W_3EIjlbEaUhsY",
  authDomain: "invento-8ff74.firebaseapp.com",
  databaseURL: "https://invento-8ff74-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "invento-8ff74",
  storageBucket: "invento-8ff74.firebasestorage.app",
  messagingSenderId: "403482416004",
  appId: "1:403482416004:web:09710eedb1b9b0fa4f83d1",
  measurementId: "G-N47PWT5DDW"
};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let inventory = [];
        let currentDocId = null;
        let html5QrCode = null;

        // --- UI Logic ---
        window.toggleMenu = () => {
            const body = document.body;
            const backdrop = document.getElementById('sideMenuBackdrop');
            if (body.classList.contains('menu-closed')) {
                body.classList.replace('menu-closed', 'menu-open');
                backdrop.classList.remove('hidden');
            } else {
                body.classList.replace('menu-open', 'menu-closed');
                backdrop.classList.add('hidden');
            }
        };

        window.switchView = (view) => {
            toggleMenu();
            if (view === 'addItem') document.getElementById('addItemModal').classList.remove('hidden');
            if (view === 'logs') document.getElementById('logsModal').classList.remove('hidden');
        };

        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        // --- Firebase Integration ---
        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById('authView').classList.add('hidden');
                document.getElementById('appView').classList.remove('hidden');
                syncData();
            } else {
                document.getElementById('authView').classList.remove('hidden');
            }
        });

        window.handleLogin = () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            setPersistence(auth, browserLocalPersistence).then(() => {
                return signInWithEmailAndPassword(auth, email, pass);
            }).catch(e => alert("خطأ: " + e.message));
        };

        window.handleLogout = () => signOut(auth);

        function syncData() {
            onSnapshot(collection(db, "inventory"), snap => {
                inventory = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderUI();
            });
            const q = query(collection(db, "logs"), orderBy("timestamp", "desc"), limit(50));
            onSnapshot(q, snap => {
                const logs = snap.docs.map(d => d.data());
                renderLogs(logs);
            });
        }

        // --- Render Engine ---
        function renderUI() {
            const container = document.getElementById('inventoryContainer');
            container.innerHTML = inventory.map(item => `
                <div class="bg-white p-5 rounded-[2rem] shadow-sm flex items-center justify-between border-2 ${item.stock <= item.minStock ? 'border-red-100 bg-red-50/30' : 'border-transparent'}">
                    <div onclick="openEdit('${item.id}')">
                        <h4 class="font-black text-slate-800">${item.name}</h4>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">ID: ${item.customID}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="changeStock('${item.id}', -1)" class="w-10 h-10 bg-slate-100 rounded-xl font-bold">-</button>
                        <span class="w-8 text-center font-black text-lg ${item.stock <= item.minStock ? 'text-red-600' : ''}">${item.stock}</span>
                        <button onclick="changeStock('${item.id}', 1)" class="w-10 h-10 bg-orange-100 text-orange-600 rounded-xl font-bold">+</button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.openEdit = (id) => {
            const item = inventory.find(i => i.id === id);
            currentDocId = id;
            document.getElementById('editTitle').innerText = item.name;
            document.getElementById('editStock').value = item.stock;
            document.getElementById('editMinVal').value = item.minStock;
            document.getElementById('editIDVal').value = item.customID;
            document.getElementById('editModal').classList.remove('hidden');
        };

        window.changeStock = async (id, val) => {
            const item = inventory.find(i => i.id === id);
            const newStock = item.stock + val;
            if (newStock < 0) return;
            await updateDoc(doc(db, "inventory", id), { stock: newStock });
            await addDoc(collection(db, "logs"), {
                itemName: item.name,
                action: val > 0 ? "زيادة" : "سحب",
                amount: Math.abs(val),
                user: auth.currentUser.email,
                timestamp: serverTimestamp()
            });
        };

        // --- Scanner Engine ---
        window.startScanner = () => {
            document.getElementById('scannerModal').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                const item = inventory.find(i => i.customID == text);
                stopScanner();
                if(item) openEdit(item.id); else alert("المنتج غير موجود");
            });
        };

        window.stopScanner = () => {
            if(html5QrCode) html5QrCode.stop().then(() => document.getElementById('scannerModal').classList.add('hidden'));
        };

        lucide.createIcons();
    </script>
</body>
</html>
