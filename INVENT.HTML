<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StockPro Ultra | إدارة المخزون الذكية</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; color: #0f172a; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); padding: 1.5rem; align-items: center; justify-content: center; }
        .modal.active { display: flex; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        #sideMenu { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .menu-open #sideMenu { transform: translateX(0); }
        .menu-closed #sideMenu { transform: translateX(100%); }
        
        .status-danger { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; }
        .status-warning { background: #fef3c7; color: #d97706; border: 1px solid #fde68a; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="menu-closed">

    <div id="authView" class="fixed inset-0 z-[500] bg-slate-900 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 text-center shadow-2xl">
            <div class="w-20 h-20 bg-orange-500 rounded-[1.5rem] mx-auto mb-6 flex items-center justify-center shadow-lg shadow-orange-200">
                <i data-lucide="package" class="text-white w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-black mb-8 text-slate-800">STOCKPRO</h2>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-orange-500 outline-none transition-all text-left" dir="ltr">
                <input type="password" id="loginPass" placeholder="كلمة المرور" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-orange-500 outline-none transition-all text-left" dir="ltr">
                <button onclick="handleLogin()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold active:scale-95 transition-all">دخول النظام</button>
            </div>
        </div>
    </div>

    <div id="appView" class="hidden min-h-screen pb-32">
        <header class="sticky top-0 z-40 glass border-b border-slate-100 px-6 py-4 flex justify-between items-center shadow-sm">
            <button onclick="toggleMenu()" class="p-3 bg-slate-50 rounded-2xl text-slate-600 active:bg-slate-100 transition-all"><i data-lucide="menu"></i></button>
            <div class="text-center">
                <h1 class="text-xl font-black text-slate-800 uppercase tracking-tighter">Stock<span class="text-orange-600">Pro</span></h1>
            </div>
            <div class="w-12 h-12 bg-orange-50 rounded-2xl flex flex-col items-center justify-center text-orange-600">
                <i data-lucide="user" class="w-5 h-5 mb-0.5"></i>
                <span id="userShortName" class="text-[8px] font-black uppercase max-w-full overflow-hidden"></span>
            </div>
        </header>

        <div class="p-6">
            <div class="relative">
                <input type="text" id="mainSearch" oninput="filterInventory()" placeholder="ابحث باسم المنتج أو الباركود..." class="w-full p-4 pr-12 rounded-2xl bg-white border border-slate-200 outline-none focus:border-orange-500 shadow-sm text-sm font-bold">
                <i data-lucide="search" class="absolute right-4 top-4 text-slate-400 w-5 h-5"></i>
            </div>
        </div>

        <div id="inventoryList" class="px-6 space-y-3"></div>

        <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-40">
            <button onclick="openScanner()" class="w-16 h-16 bg-orange-600 text-white rounded-[2rem] shadow-2xl shadow-orange-200 flex items-center justify-center active:scale-90 transition-all border-4 border-white rotate-45 hover:rotate-0">
                <i data-lucide="qr-code" class="w-7 h-7 -rotate-45 hover:rotate-0"></i>
            </button>
        </div>

        <div id="menuBackdrop" onclick="toggleMenu()" class="fixed inset-0 bg-slate-900/40 z-[50] hidden backdrop-blur-sm"></div>
        <aside id="sideMenu" class="fixed top-0 right-0 bottom-0 w-[85%] max-w-sm bg-white z-[60] p-8 flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-8 pb-4 border-b">
                <h2 class="text-xl font-black text-slate-800">الإدارة والرقابة</h2>
                <button onclick="toggleMenu()" class="p-2 bg-slate-50 rounded-full text-slate-500"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <nav class="space-y-2 flex-1">
                <button onclick="showModal('addItemModal')" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-orange-50 text-slate-700 hover:text-orange-600 font-bold transition-all">
                    <div class="p-2 bg-orange-100 rounded-xl"><i data-lucide="plus-circle" class="w-5 h-5"></i></div> إضافة منتج جديد
                </button>
                <button onclick="showModal('addOrderModal')" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-blue-50 text-slate-700 hover:text-blue-600 font-bold transition-all">
                    <div class="p-2 bg-blue-100 rounded-xl"><i data-lucide="truck" class="w-5 h-5"></i></div> طلبية توريد جديدة
                </button>
                <button onclick="showModal('ordersModal')" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-slate-50 text-slate-700 font-bold transition-all">
                    <div class="p-2 bg-slate-100 rounded-xl"><i data-lucide="list-ordered" class="w-5 h-5"></i></div> عرض الطلبيات النشطة
                </button>
                <button onclick="showModal('logsModal')" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-slate-50 text-slate-700 font-bold transition-all">
                    <div class="p-2 bg-slate-100 rounded-xl"><i data-lucide="clipboard-list" class="w-5 h-5"></i></div> السجل اليومي
                </button>
                
                <div class="pt-6 mt-6 border-t border-slate-100">
                    <button onclick="sendTelegramReport('manual')" id="tgBtn" class="w-full flex items-center justify-center gap-3 p-4 rounded-2xl bg-blue-600 text-white font-bold shadow-lg shadow-blue-100 active:scale-95 transition-all">
                        <i data-lucide="send" class="w-5 h-5"></i> إرسال تقرير لتيليجرام
                    </button>
                </div>
            </nav>

            <button onclick="handleLogout()" class="w-full mt-auto flex items-center justify-center gap-2 p-4 rounded-2xl bg-red-50 text-red-500 font-bold active:scale-95">
                <i data-lucide="log-out" class="w-4 h-4"></i> تسجيل خروج
            </button>
        </aside>
    </div>

    <div id="actionModal" class="modal">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 space-y-6 text-center shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-orange-500"></div>
            <div>
                <h3 id="actionTitle" class="font-black text-2xl text-slate-800">المنتج</h3>
                <p id="actionStock" class="text-xs font-bold text-slate-400 mt-1"></p>
            </div>
            <div class="flex justify-center items-center gap-6 bg-slate-50 p-4 rounded-[2rem]">
                <button onclick="adjustTemp(-1)" class="w-14 h-14 bg-white rounded-2xl shadow-sm text-2xl font-black active:bg-slate-200">-</button>
                <span id="tempQty" class="text-5xl font-black text-slate-900 tabular-nums">1</span>
                <button onclick="adjustTemp(1)" class="w-14 h-14 bg-white rounded-2xl shadow-sm text-2xl font-black active:bg-slate-200">+</button>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="performTx('sub')" class="bg-red-50 text-red-600 p-4 rounded-2xl font-black text-lg active:scale-95">سحب</button>
                <button onclick="performTx('add')" class="bg-orange-600 text-white p-4 rounded-2xl font-black text-lg active:scale-95 shadow-md shadow-orange-100">إضافة</button>
            </div>
            <button onclick="closeModal('actionModal')" class="text-slate-400 font-bold text-sm">تجاهل وإغلاق</button>
        </div>
    </div>

    <div id="addItemModal" class="modal">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 space-y-4 shadow-2xl">
            <h3 class="font-black text-xl mb-4 text-slate-800">تعريف صنف جديد</h3>
            <input type="text" id="newName" placeholder="اسم المنتج" class="w-full p-4 bg-slate-50 rounded-xl outline-none border border-slate-100 focus:border-orange-500">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="newID" placeholder="باركود (QR)" class="p-4 bg-slate-50 rounded-xl outline-none border border-slate-100 focus:border-orange-500">
                <input type="number" id="newMin" placeholder="حد التنبيه (مثال: 5)" class="p-4 bg-slate-50 rounded-xl outline-none border border-slate-100 focus:border-orange-500">
            </div>
            <input type="number" id="newStock" placeholder="الكمية الافتتاحية" class="w-full p-4 bg-slate-50 rounded-xl outline-none border border-slate-100 focus:border-orange-500">
            <button onclick="commitNewItem()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold mt-2 shadow-lg">حفظ المنتج</button>
            <button onclick="closeModal('addItemModal')" class="w-full text-slate-400 font-bold py-2">إلغاء</button>
        </div>
    </div>

    <div id="addOrderModal" class="modal">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 space-y-4 shadow-2xl">
            <h3 class="font-black text-xl mb-4 text-blue-600">طلب توريد بضاعة</h3>
            <input type="text" id="orderSupplier" placeholder="اسم الشركة أو المورد" class="w-full p-4 bg-slate-50 rounded-xl outline-none border border-slate-100">
            <textarea id="orderDetails" placeholder="الكميات والأنواع المطلوبة..." class="w-full p-4 bg-slate-50 rounded-xl outline-none border border-slate-100" rows="4"></textarea>
            <button onclick="commitNewOrder()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold mt-2 shadow-lg shadow-blue-100">اعتماد الطلب</button>
            <button onclick="closeModal('addOrderModal')" class="w-full text-slate-400 font-bold py-2">إلغاء</button>
        </div>
    </div>

    <div id="logsModal" class="modal">
        <div class="bg-white w-full max-w-md h-[85vh] rounded-[2.5rem] p-6 flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-6 px-2">
                <h3 class="font-black text-xl text-slate-800">السجل الرقابي</h3>
                <button onclick="closeModal('logsModal')" class="p-2 bg-slate-100 rounded-full"><i data-lucide="x"></i></button>
            </div>
            <div id="logsContainer" class="flex-1 overflow-y-auto space-y-3 pb-6 px-2"></div>
        </div>
    </div>

    <div id="ordersModal" class="modal">
        <div class="bg-white w-full max-w-md h-[80vh] rounded-[2.5rem] p-6 flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-6 px-2">
                <h3 class="font-black text-xl text-slate-800">الطلبيات النشطة</h3>
                <button onclick="closeModal('ordersModal')" class="p-2 bg-slate-100 rounded-full"><i data-lucide="x"></i></button>
            </div>
            <div id="ordersContainer" class="flex-1 overflow-y-auto space-y-4 pb-6 px-2"></div>
        </div>
    </div>

    <div id="scannerModal" class="modal" style="padding:0; background: #000;">
        <div class="w-full h-full flex flex-col bg-black">
            <div id="reader" class="flex-1"></div>
            <button onclick="stopScanner()" class="p-8 bg-white font-black text-slate-900 text-lg">إغلاق الكاميرا</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, query, orderBy, limit, serverTimestamp, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAi6Wd2HzSdgAB63MWt4W_3EIjlbEaUhsY",
          authDomain: "invento-8ff74.firebaseapp.com",
          projectId: "invento-8ff74",
          storageBucket: "invento-8ff74.firebasestorage.app",
          messagingSenderId: "403482416004",
          appId: "1:403482416004:web:09710eedb1b9b0fa4f83d1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- بيانات التيليجرام الثابتة التي طلبتها ---
        const TG_BOT_TOKEN = "7824436838:AAGkVVcuRwDuMiHSAbm1BpmUcBDb65hBDgo";
        const TG_CHAT_ID = "7926392817";

        let inventory = [], logs = [], orders = [], activeItem = null, tempQty = 1, scanner = null;

        // --- مراقبة تسجيل الدخول ---
        onAuthStateChanged(auth, user => {
            if (user) {
                document.getElementById('authView').classList.add('hidden');
                document.getElementById('appView').classList.remove('hidden');
                document.getElementById('userShortName').innerText = user.email.split('@')[0].substring(0,6);
                startSync();
                setTimeout(checkAutoReport, 4000); // التحقق من الإرسال التلقائي
            } else {
                document.getElementById('authView').classList.remove('hidden');
                document.getElementById('appView').classList.add('hidden');
            }
        });

        // --- مزامنة البيانات من Firebase ---
        function startSync() {
            onSnapshot(collection(db, "inventory"), snap => {
                inventory = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderInventory(inventory);
            });
            onSnapshot(query(collection(db, "logs"), orderBy("timestamp", "desc"), limit(40)), snap => {
                logs = snap.docs.map(d => d.data());
                renderLogs();
            });
            onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "desc"), limit(20)), snap => {
                orders = snap.docs.map(d => d.data());
                renderOrders();
            });
        }

        // --- وظائف العرض (UI Renderers) ---
        function renderInventory(dataList) {
            const list = document.getElementById('inventoryList');
            list.innerHTML = dataList.map(i => {
                let statusClass = "", statusIcon = "";
                if(i.stock <= 0) { statusClass = "status-danger"; statusIcon = "⚠️ نافذ"; }
                else if(i.stock <= (i.minStock || 5)) { statusClass = "status-warning"; statusIcon = "⚠️ منخفض"; }

                return `
                <div onclick="window.openActionModal('${i.id}')" class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center active:scale-95 transition-all ${statusClass}">
                    <div>
                        <h4 class="font-bold text-slate-800 text-lg">${i.name}</h4>
                        <div class="flex items-center gap-2 mt-1">
                            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest bg-slate-50 px-2 py-0.5 rounded-md border border-slate-100">${i.customID}</span>
                            <span class="text-[9px] font-black uppercase">${statusIcon}</span>
                        </div>
                    </div>
                    <div class="text-3xl font-black text-slate-700 tabular-nums">${i.stock}</div>
                </div>`;
            }).join('');
        }

        function renderLogs() {
            const container = document.getElementById('logsContainer');
            container.innerHTML = logs.map(l => {
                // نظام Fallback لحماية السجلات القديمة من ظهور undefined
                const actionText = l.action || 'حركة';
                const itemText = l.itemName || l.msg || 'عنصر غير محدد';
                const userText = l.userEmail ? l.userEmail.split('@')[0] : 'نظام';
                const timeText = l.timestamp ? l.timestamp.toDate().toLocaleString('ar-EG', {hour: '2-digit', minute:'2-digit', day:'numeric', month:'numeric'}) : 'جارٍ..';
                const isAdd = actionText.includes('إضافة');
                const isOrder = actionText.includes('طلب');

                let borderColor = isAdd ? 'border-green-400' : 'border-red-400';
                if(isOrder) borderColor = 'border-blue-400';

                return `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-50 border-r-4 ${borderColor}">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-black uppercase bg-slate-100 text-slate-600 px-2 py-0.5 rounded">${actionText} ${l.amount ? '('+l.amount+')' : ''}</span>
                        <span class="text-[10px] font-bold text-slate-400">${timeText}</span>
                    </div>
                    <h5 class="font-bold text-slate-800 text-sm my-1">${itemText}</h5>
                    <div class="flex items-center gap-1 mt-2 text-orange-600">
                        <i data-lucide="user" class="w-3 h-3"></i>
                        <span class="text-[10px] font-black uppercase tracking-wider">${userText}</span>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            container.innerHTML = orders.map(o => {
                const userText = o.userEmail ? o.userEmail.split('@')[0] : 'غير معروف';
                const timeText = o.timestamp ? o.timestamp.toDate().toLocaleDateString('ar-EG') : '';
                return `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 border-t-4 border-t-blue-500">
                    <h4 class="font-black text-slate-800">${o.supplier}</h4>
                    <p class="text-sm text-slate-600 mt-2 bg-slate-50 p-3 rounded-xl border border-slate-100">${o.details}</p>
                    <div class="flex justify-between items-center mt-3 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                        <span>👤 ${userText}</span>
                        <span>🗓️ ${timeText}</span>
                    </div>
                </div>`;
            }).join('');
        }

        // --- ربط الدوال بـ Window لتفعيل الأزرار ---
        window.handleLogin = () => signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPass').value).catch(() => alert("بيانات غير صحيحة"));
        window.handleLogout = () => signOut(auth);
        
        window.toggleMenu = () => { document.body.classList.toggle('menu-open'); document.body.classList.toggle('menu-closed'); document.getElementById('menuBackdrop').classList.toggle('hidden'); };
        window.showModal = (id) => { window.toggleMenu(); document.getElementById(id).classList.add('active'); };
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');

        window.filterInventory = () => {
            const q = document.getElementById('mainSearch').value.toLowerCase();
            renderInventory(inventory.filter(i => i.name.toLowerCase().includes(q) || i.customID.toLowerCase().includes(q)));
        };

        // --- الإضافة والمعاملات ---
        window.commitNewItem = async () => {
            const name = document.getElementById('newName').value;
            const customID = document.getElementById('newID').value;
            const stock = Number(document.getElementById('newStock').value);
            const minStock = Number(document.getElementById('newMin').value) || 5;

            if(!name || !customID) return alert("الاسم والباركود مطلوبان");

            const email = auth.currentUser.email;
            await addDoc(collection(db, "inventory"), { name, customID, stock, minStock });
            
            // تسجيل الحركة بأسماء الحقول المعتمدة
            await addDoc(collection(db, "logs"), {
                action: '✨ تعريف منتج',
                itemName: name,
                amount: stock,
                userEmail: email,
                timestamp: serverTimestamp()
            });
            
            document.getElementById('newName').value = ""; document.getElementById('newID').value = ""; document.getElementById('newStock').value = "";
            window.closeModal('addItemModal');
            alert("تم حفظ المنتج ✅");
        };

        window.commitNewOrder = async () => {
            const supplier = document.getElementById('orderSupplier').value;
            const details = document.getElementById('orderDetails').value;
            if(!supplier || !details) return alert("أكمل البيانات");

            const email = auth.currentUser.email;
            await addDoc(collection(db, "orders"), { supplier, details, userEmail: email, timestamp: serverTimestamp() });
            
            await addDoc(collection(db, "logs"), {
                action: '📦 طلب توريد',
                itemName: `من: ${supplier}`,
                amount: '',
                userEmail: email,
                timestamp: serverTimestamp()
            });

            document.getElementById('orderSupplier').value = ""; document.getElementById('orderDetails').value = "";
            window.closeModal('addOrderModal');
            alert("تم تأكيد الطلب ✅");
        };

        window.openActionModal = (id) => {
            activeItem = inventory.find(i => i.id === id);
            tempQty = 1;
            document.getElementById('actionTitle').innerText = activeItem.name;
            document.getElementById('actionStock').innerText = "المخزون الحالي: " + activeItem.stock;
            document.getElementById('tempQty').innerText = tempQty;
            document.getElementById('actionModal').classList.add('active');
        };

        window.adjustTemp = (v) => { tempQty = Math.max(1, tempQty + v); document.getElementById('tempQty').innerText = tempQty; };

        window.performTx = async (mode) => {
            const change = mode === 'add' ? tempQty : -tempQty;
            const newStock = activeItem.stock + change;
            if(newStock < 0) return alert("لا يوجد رصيد كافٍ للسحب!");

            await updateDoc(doc(db, "inventory", activeItem.id), { stock: newStock });
            
            await addDoc(collection(db, "logs"), {
                action: mode === 'add' ? '➕ إضافة' : '➖ سحب',
                itemName: activeItem.name,
                amount: tempQty,
                userEmail: auth.currentUser.email,
                timestamp: serverTimestamp()
            });
            
            window.closeModal('actionModal');
        };

        // --- التقرير الآلي واليدوي (تيليجرام) ---
        window.sendTelegramReport = async (mode = 'auto') => {
            if(mode === 'manual') {
                const btn = document.getElementById('tgBtn');
                btn.innerHTML = `<i data-lucide="loader" class="animate-spin"></i> جاري الإرسال...`;
            }

            const user = auth.currentUser.email.split('@')[0];
            let msg = `📊 تقرير STOCKPRO الإداري\n👤 بواسطة: ${user}\n📅 التاريخ: ${new Date().toLocaleString('ar-EG')}\n------------------------\n\n`;
            
            // استخراج النواقص
            let lowStockItems = [];
            let allItemsMsg = `📦 تفاصيل المستودع:\n`;
            
            inventory.forEach(i => {
                let icon = '✅';
                if(i.stock <= (i.minStock || 5)) {
                    icon = i.stock <= 0 ? '❌' : '⚠️';
                    lowStockItems.push(`${i.name} (${i.stock})`);
                }
                allItemsMsg += `${icon} ${i.name}: ${i.stock}\n`;
            });

            // قسم التنبيهات
            if(lowStockItems.length > 0) {
                msg += `🚨 تنبيه بنواقص البضاعة:\n`;
                lowStockItems.forEach(item => msg += `📍 ${item}\n`);
                msg += `------------------------\n\n`;
            }

            msg += allItemsMsg;

            // قسم السجلات (أحدث 5 عمليات)
            msg += `\n🔄 أحدث 5 عمليات بالموقع:\n`;
            logs.slice(0, 5).forEach(l => {
                const action = l.action || '';
                const item = l.itemName || l.msg || '';
                const usr = l.userEmail ? l.userEmail.split('@')[0] : '';
                msg += `- ${action} ${item} (${usr})\n`;
            });

            try {
                const response = await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msg })
                });
                if(response.ok) {
                    await setDoc(doc(db, "metadata", "telegram"), { lastSent: serverTimestamp() });
                    if(mode === 'manual') alert("تم إرسال التقرير الشامل لتيليجرام بنجاح 🚀");
                } else {
                    if(mode === 'manual') alert("عذراً، فشل الإرسال. قد يكون معرف الشات خاطئاً.");
                }
            } catch (e) { 
                if(mode === 'manual') alert("فشل الاتصال بالإنترنت أو بسيرفر تيليجرام."); 
            } finally {
                if(mode === 'manual') {
                    const btn = document.getElementById('tgBtn');
                    btn.innerHTML = `<i data-lucide="send" class="w-5 h-5"></i> إرسال تقرير لتيليجرام`;
                    lucide.createIcons();
                }
            }
        };

        // فحص الإرسال التلقائي كل 3 أيام
        async function checkAutoReport() {
            try {
                const snap = await getDoc(doc(db, "metadata", "telegram"));
                if (snap.exists() && snap.data().lastSent) {
                    const lastDate = snap.data().lastSent.toDate();
                    const diffDays = (new Date() - lastDate) / (1000 * 60 * 60 * 24);
                    if (diffDays >= 3) window.sendTelegramReport('auto');
                } else {
                    window.sendTelegramReport('auto'); // إرسال لأول مرة
                }
            } catch(e) { console.error("Auto report error", e); }
        }

        // --- السكنر ---
        window.openScanner = () => {
            document.getElementById('scannerModal').classList.add('active');
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                const item = inventory.find(i => i.customID == txt);
                if(item) { window.stopScanner(); window.openActionModal(item.id); }
                else { alert("لم يتم العثور على المنتج"); }
            });
        };
        window.stopScanner = () => { if(scanner) scanner.stop().then(() => document.getElementById('scannerModal').classList.remove('active')); };

        lucide.createIcons();
    </script>
</body>
</html>
