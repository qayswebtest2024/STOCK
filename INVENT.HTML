<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StockPro | بيتزا ودوناتس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #f97316; }
        body { font-family: 'Tajawal', sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        .glass-morphism { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .nav-active { color: var(--primary); }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }
        /* Hide scrollbar */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <div id="loadingOverlay" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-16 h-16 border-4 border-orange-200 border-t-orange-600 rounded-full animate-spin"></div>
        <p class="mt-4 text-orange-600 font-bold">جاري تحميل المخزون...</p>
    </div>

    <header class="sticky top-0 z-40 glass-morphism border-b p-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-extrabold text-gray-800">مخزن <span class="text-orange-600">البيتزا</span></h1>
            <p id="statusIndicator" class="text-[10px] text-green-500 flex items-center gap-1">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> متصل بقاعدة البيانات
            </p>
        </div>
        <button onclick="refreshData()" class="p-2 bg-gray-100 rounded-full">
            <i data-lucide="rotate-cw" class="w-5 h-5 text-gray-600"></i>
        </button>
    </header>

    <main class="p-4 space-y-4">
        
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-orange-50">
                <i data-lucide="package" class="w-5 h-5 text-orange-500 mb-1"></i>
                <div id="statTotal" class="text-2xl font-bold">0</div>
                <div class="text-xs text-gray-500">إجمالي الأصناف</div>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-red-50">
                <i data-lucide="alert-triangle" class="w-5 h-5 text-red-500 mb-1"></i>
                <div id="statLow" class="text-2xl font-bold text-red-600">0</div>
                <div class="text-xs text-gray-500">أصناف شارفت على النفاذ</div>
            </div>
        </div>

        <div class="relative">
            <i data-lucide="search" class="absolute right-3 top-3.5 w-5 h-5 text-gray-400"></i>
            <input type="text" id="searchInput" oninput="filterItems()" placeholder="بحث عن منتج..." 
                   class="w-full p-3 pr-10 rounded-xl bg-white border-none shadow-sm focus:ring-2 focus:ring-orange-500 outline-none">
        </div>

        <div id="inventoryContainer" class="space-y-3">
            </div>
    </main>

    <div id="qrModal" class="fixed inset-0 z-50 bg-black bg-opacity-90 hidden flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white rounded-3xl overflow-hidden relative">
            <div id="reader" class="w-full"></div>
            <button onclick="closeScanner()" class="absolute top-4 left-4 bg-white/20 p-2 rounded-full backdrop-blur-md">
                <i data-lucide="x" class="text-white"></i>
            </button>
            <div class="p-4 text-center">
                <p class="text-gray-600 font-bold">وجه الكاميرا نحو الـ QR الخاص بالمنتج</p>
            </div>
        </div>
    </div>

    <div id="editModal" class="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm hidden flex items-end sm:items-center justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2rem] p-8 space-y-6 shadow-2xl animate-slide-up">
            <div class="flex justify-between items-center">
                <h3 id="modalItemName" class="text-xl font-bold">اسم المنتج</h3>
                <button onclick="closeEditModal()" class="text-gray-400"><i data-lucide="x"></i></button>
            </div>
            <div class="flex items-center justify-around bg-gray-50 p-6 rounded-2xl">
                <button onclick="adjustTempStock(-1)" class="w-14 h-14 bg-white shadow-md rounded-xl flex items-center justify-center text-2xl font-bold text-red-500">-</button>
                <div id="tempStockVal" class="text-4xl font-extrabold text-gray-800">1</div>
                <button onclick="adjustTempStock(1)" class="w-14 h-14 bg-white shadow-md rounded-xl flex items-center justify-center text-2xl font-bold text-green-500">+</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="submitStockChange('sub')" class="p-4 bg-gray-100 text-gray-800 rounded-2xl font-bold flex flex-col items-center gap-2">
                    <i data-lucide="minus-circle"></i> سحب من المخزن
                </button>
                <button onclick="submitStockChange('add')" class="p-4 bg-orange-600 text-white rounded-2xl font-bold flex flex-col items-center gap-2 shadow-lg shadow-orange-200">
                    <i data-lucide="plus-circle"></i> إضافة للمخزن
                </button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 glass-morphism border-t safe-area-bottom z-40">
        <div class="flex justify-around items-center h-20 px-4">
            <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="flex flex-col items-center gap-1 nav-active">
                <i data-lucide="layout-grid" class="w-6 h-6"></i>
                <span class="text-[10px]">المخزن</span>
            </button>
            
            <button onclick="openScanner()" class="flex flex-col items-center -translate-y-6">
                <div class="w-16 h-16 bg-orange-600 rounded-full flex items-center justify-center text-white shadow-xl shadow-orange-200 border-4 border-white">
                    <i data-lucide="qr-code" class="w-8 h-8"></i>
                </div>
                <span class="text-[10px] mt-1 text-orange-600 font-bold">مسح QR</span>
            </button>

            <button onclick="alert('سجل العمليات قيد التطوير')" class="flex flex-col items-center gap-1 text-gray-400">
                <i data-lucide="history" class="w-6 h-6"></i>
                <span class="text-[10px]">السجلات</span>
            </button>
        </div>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzjls-8BMaMkqMXNdVtWZr4JWBATMy6STZuRaoU1G6Co3g3u3IEvIYwxiCEMvbdEy7CXA/exec"; // ضع رابطك هنا
        let inventoryData = [];
        let currentEditingId = null;
        let tempStockAmount = 1;
        let html5QrCode = null;

        // Initialize Lucide Icons
        lucide.createIcons();

        // Fetch Data from Google Sheets
        async function refreshData() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            try {
                const response = await fetch(API_URL);
                inventoryData = await response.json();
                renderInventory(inventoryData);
                updateStats();
            } catch (error) {
                console.error("Fetch Error:", error);
            } finally {
                document.getElementById('loadingOverlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loadingOverlay').style.display = 'none', 500);
            }
        }

        function renderInventory(items) {
            const container = document.getElementById('inventoryContainer');
            container.innerHTML = '';
            items.forEach(item => {
                const isLow = Number(item.Stock) <= Number(item.MinStock);
                const card = `
                    <div onclick="openEditModal('${item.ID}')" class="bg-white p-4 rounded-2xl shadow-sm flex items-center justify-between border-r-4 ${isLow ? 'border-red-500 bg-red-50' : 'border-transparent'}">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-gray-100 rounded-xl flex items-center justify-center text-xl">
                                ${item.Category === 'Drinks' ? '🥤' : '📦'}
                            </div>
                            <div>
                                <h4 class="font-bold text-gray-800">${item.Name}</h4>
                                <p class="text-xs text-gray-400">ID: ${item.ID} | الحد الأدنى: ${item.MinStock}</p>
                            </div>
                        </div>
                        <div class="text-left">
                            <div class="text-2xl font-extrabold ${isLow ? 'text-red-600' : 'text-gray-800'}">${item.Stock}</div>
                            <div class="text-[10px] text-gray-400 font-bold uppercase">${item.Unit}</div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
            lucide.createIcons();
        }

        function updateStats() {
            document.getElementById('statTotal').innerText = inventoryData.length;
            document.getElementById('statLow').innerText = inventoryData.filter(i => Number(i.Stock) <= Number(i.MinStock)).length;
        }

        function filterItems() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = inventoryData.filter(item => 
                item.Name.toLowerCase().includes(query) || item.ID.toString().toLowerCase().includes(query)
            );
            renderInventory(filtered);
        }

        // Modal Logic
        function openEditModal(id) {
            const item = inventoryData.find(i => i.ID.toString() === id.toString());
            if (!item) return;
            currentEditingId = id;
            tempStockAmount = 1;
            document.getElementById('modalItemName').innerText = item.Name;
            document.getElementById('tempStockVal').innerText = tempStockAmount;
            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        function adjustTempStock(val) {
            tempStockAmount += val;
            if (tempStockAmount < 1) tempStockAmount = 1;
            document.getElementById('tempStockVal').innerText = tempStockAmount;
        }

        async function submitStockChange(type) {
            const btn = event.currentTarget;
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin text-xl">⏳</span>`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        id: currentEditingId,
                        actionType: type,
                        amount: tempStockAmount
                    })
                });
                const result = await response.json();
                if (result.status === 'success') {
                    await refreshData();
                    closeEditModal();
                }
            } catch (error) {
                alert("حدث خطأ أثناء التحديث");
            } finally {
                btn.disabled = false;
            }
        }

        // QR Scanner Logic
        function openScanner() {
            document.getElementById('qrModal').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                closeScanner();
                openEditModal(decodedText); // البحث عن الصنف بـ ID الممسوح
            });
        }

        function closeScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('qrModal').classList.add('hidden');
                });
            }
        }

        // Start App
        refreshData();
    </script>
</body>
</html>
